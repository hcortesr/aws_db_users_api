version: '1'

services:
  frontend:
    image: nginx:1.29.0-alpine3.22-slim
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - app-network
  backend:
    image: node:22-alpine3.22
    depends_on:
      - db
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ../backend:/app:ro
    entrypoint: ["npm", "start"]
    networks:
      - app-network
  
  db:
    image: amazon/dynamodb-local
    networks:
      - app-network

networks:
  app-network:
