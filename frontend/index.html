<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players DB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #13151a;
      --border: #1f2330;
      --accent: #00f5a0;
      --accent2: #00d4ff;
      --danger: #ff4466;
      --text: #e8eaf0;
      --muted: #5a6070;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; }

    /* Glowing accent line */
    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    /* Table rows animate in */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .player-row { animation: slideIn 0.25s ease both; }

    @keyframes pulse-border {
      0%, 100% { border-color: var(--accent); }
      50%       { border-color: var(--accent2); }
    }

    input:focus {
      outline: none;
      animation: pulse-border 2s ease infinite;
    }

    /* Glowing button */
    .btn-add {
      background: var(--accent);
      color: #000;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .btn-add:hover {
      box-shadow: 0 0 18px var(--accent);
      transform: translateY(-1px);
    }
    .btn-add:active { transform: translateY(0); }

    /* Delete button */
    .btn-del {
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }
    .btn-del:hover { color: var(--danger); transform: scale(1.15); }

    /* Toast */
    #toast {
      transition: opacity 0.3s, transform 0.3s;
    }
    #toast.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Loader dots */
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .dot { animation: blink 1.2s infinite; }
    .dot:nth-child(2){ animation-delay:.2s; }
    .dot:nth-child(3){ animation-delay:.4s; }
  </style>
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-mono"
       style="background:var(--surface); border:1px solid var(--border);">
    <span id="toast-icon">✓</span>
    <span id="toast-msg">Action completed</span>
  </div>

  <div class="container max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-10">
      <div class="accent-bar mb-6 w-24 rounded-full"></div>
      <h1 class="text-4xl font-extrabold tracking-tight" style="color:var(--text);">
        Players <span style="color:var(--accent);">DB</span>
      </h1>
      <p class="mt-1 text-sm font-mono" style="color:var(--muted);">apptest1 · players table</p>
    </div>

    <!-- Add player form -->
    <div class="rounded-xl p-5 mb-8" style="background:var(--surface); border:1px solid var(--border);">
      <h2 class="text-xs font-mono uppercase tracking-widest mb-4" style="color:var(--accent);">+ New player</h2>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="inp-name" type="text" placeholder="Name"
               class="flex-1 rounded-lg px-4 py-2 text-sm font-mono border"
               style="background:#0e1018; color:var(--text); border-color:var(--border);" />
        <input id="inp-age" type="number" placeholder="Age" min="1" max="120"
               class="w-full sm:w-28 rounded-lg px-4 py-2 text-sm font-mono border"
               style="background:#0e1018; color:var(--text); border-color:var(--border);" />
        <button id="btn-add" class="btn-add rounded-lg px-5 py-2 text-sm font-bold tracking-wide whitespace-nowrap">
          Add
        </button>
      </div>
      <p id="form-error" class="mt-2 text-xs font-mono hidden" style="color:var(--danger);"></p>
    </div>

    <!-- Players table -->
    <div class="rounded-xl overflow-hidden" style="border:1px solid var(--border);">

      <!-- Table header -->
      <div class="grid grid-cols-12 px-5 py-3 text-xs font-mono uppercase tracking-widest"
           style="background:var(--surface); color:var(--muted); border-bottom:1px solid var(--border);">
        <span class="col-span-1">#</span>
        <span class="col-span-5">Name</span>
        <span class="col-span-4">Age</span>
        <span class="col-span-2 text-right">Action</span>
      </div>

      <!-- Loader -->
      <div id="loader" class="flex justify-center items-center py-12" style="background:var(--bg);">
        <span class="font-mono text-sm" style="color:var(--muted);">
          Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        </span>
      </div>

      <!-- Empty state -->
      <div id="empty" class="hidden flex-col items-center justify-center py-14 text-center" style="background:var(--bg);">
        <div class="text-4xl mb-3">🗄️</div>
        <p class="text-sm font-mono" style="color:var(--muted);">No players registered</p>
      </div>

      <!-- Rows -->
      <div id="players-list" style="background:var(--bg);"></div>
    </div>

    <!-- Footer count -->
    <p id="count-label" class="mt-4 text-xs font-mono text-right" style="color:var(--muted);"></p>

  </div>

  <script src="app.js"></script>
</body>
</html>
